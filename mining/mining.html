<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QNT Mining Dashboard</title>
<style>
:root{--bg:#0a0e17;--card:#111827;--border:#2a3a55;--text:#e8edf5;--dim:#8899bb;--accent:#00d4aa;--blue:#3b82f6;--purple:#a855f7;--orange:#f59e0b;--green:#22c55e;--red:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'SF Mono','Fira Code',monospace;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-width:1200px;margin:0 auto;padding:20px}
header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:20px}
.logo{font-size:22px;font-weight:800;color:var(--accent)}
.logo small{font-size:10px;color:var(--dim);display:block;letter-spacing:2px}
.status{display:flex;align-items:center;gap:8px;font-size:13px}
.dot{width:8px;height:8px;border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px}
.card .label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.card .value{font-size:28px;font-weight:700}
.card .bar{height:3px;border-radius:3px;margin-top:12px}
.card:nth-child(1) .bar{background:var(--accent)}
.card:nth-child(2) .bar{background:var(--blue)}
.card:nth-child(3) .bar{background:var(--purple)}
.card:nth-child(4) .bar{background:var(--orange)}
.card:nth-child(5) .bar{background:var(--green)}
.card:nth-child(6) .bar{background:var(--red)}
.log-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:20px}
.log-entry{font-size:12px;line-height:2.2;padding:2px 0;border-bottom:1px solid rgba(42,58,85,.3)}
.log-entry:last-child{border-bottom:none}
.log-time{color:var(--dim);margin-right:10px}
.log-signed{color:var(--green)}
.log-gen{color:var(--blue)}
.log-info{color:var(--dim)}
.refresh{font-size:11px;color:var(--dim);text-align:center;margin-top:16px}
.back-link{font-size:13px;color:var(--dim)}
.back-link:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">QNT <small>MINING DASHBOARD</small></div>
    <div style="display:flex;align-items:center;gap:16px">
      <a href="/dashboard" class="back-link">← Back to Dashboard</a>
      <div class="status">
        <div class="dot" id="statusDot" style="background:var(--dim)"></div>
        <span id="statusText">Connecting...</span>
      </div>
    </div>
  </header>

  <div class="grid">
    <div class="card">
      <div class="label">Mining Uptime</div>
      <div class="value" id="mUptime" style="color:var(--accent)">—</div>
      <div class="bar"></div>
    </div>
    <div class="card">
      <div class="label">Blocks Mined</div>
      <div class="value" id="mBlocks" style="color:var(--blue)">—</div>
      <div class="bar"></div>
    </div>
    <div class="card">
      <div class="label">Avg Block Time</div>
      <div class="value" id="mAvgTime" style="color:var(--purple)">—</div>
      <div class="bar"></div>
    </div>
    <div class="card">
      <div class="label">Last Block</div>
      <div class="value" id="mLastBlock" style="font-size:13px;color:var(--text)">—</div>
      <div class="bar"></div>
    </div>
    <div class="card">
      <div class="label">PoUW Status</div>
      <div class="value" id="mPoUW" style="color:var(--green)">—</div>
      <div class="bar"></div>
    </div>
    <div class="card">
      <div class="label">Signature Size</div>
      <div class="value" id="mSigSize" style="color:var(--orange)">—</div>
      <div class="bar"></div>
    </div>
  </div>

  <!-- Stratum Stats -->
  <div class="card" style="margin-bottom:20px;border-color:rgba(168,85,247,.3)">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="label" style="margin-bottom:0">⛏ Stratum Server</div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="dot" id="stratumDot" style="background:var(--dim)"></div>
        <span id="stratumStatus" style="font-size:12px;color:var(--dim)">—</span>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px">
      <div><div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Status</div><div style="font-size:18px;font-weight:700" id="sStatus">—</div></div>
      <div><div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Port</div><div style="font-size:18px;font-weight:700" id="sPort">—</div></div>
      <div><div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Connections</div><div style="font-size:18px;font-weight:700" id="sConn">—</div></div>
      <div><div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Workers</div><div style="font-size:18px;font-weight:700" id="sWorkers">—</div></div>
      <div><div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Shares</div><div style="font-size:18px;font-weight:700" id="sShares">—</div></div>
      <div><div style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Blocks Found</div><div style="font-size:18px;font-weight:700;color:var(--green)" id="sBlocks">—</div></div>
    </div>
    <div id="workerList" style="margin-top:12px;font-size:12px;color:var(--dim)"></div>
  </div>

  <div class="log-box">
    <div class="label" style="margin-bottom:12px">⛏ PoUW Mining Log (last 20 entries)</div>
    <div id="miningLog">
      <div style="color:var(--dim);text-align:center;padding:30px">Loading...</div>
    </div>
  </div>

  <div class="refresh" id="refreshTime">Last updated: —</div>
</div>

<script>
async function loadMining() {
  try {
    const r = await fetch('/api/mining/status');
    const d = await r.json();
    if (d.error) throw new Error(d.error);

    document.getElementById('statusDot').style.background = 'var(--green)';
    document.getElementById('statusText').textContent = 'Connected — Mining Active';
    document.getElementById('mUptime').textContent = d.uptime_human || '—';
    document.getElementById('mBlocks').textContent = d.blocks_mined ?? '—';
    document.getElementById('mAvgTime').textContent = d.avg_block_time ? d.avg_block_time.toFixed(1) + 's' : '—';
    document.getElementById('mLastBlock').textContent = d.last_block_time || '—';
    document.getElementById('mSigSize').textContent = d.sig_size ? d.sig_size.toLocaleString() + ' B' : '—';

    if (d.pouw_enabled) {
      document.getElementById('mPoUW').textContent = '✓ Active';
      document.getElementById('mPoUW').style.color = 'var(--green)';
    } else {
      document.getElementById('mPoUW').textContent = '✗ Inactive';
      document.getElementById('mPoUW').style.color = 'var(--dim)';
    }

    if (d.recent_logs && d.recent_logs.length) {
      document.getElementById('miningLog').innerHTML = d.recent_logs.map(l => {
        const time = l.timestamp || '';
        const msg = l.message || '';
        let cls = 'log-info';
        if (msg.includes('signed successfully')) cls = 'log-signed';
        else if (msg.includes('key generated')) cls = 'log-gen';
        return '<div class="log-entry"><span class="log-time">[' + time + ']</span><span class="' + cls + '">' + msg + '</span></div>';
      }).join('');
    } else {
      document.getElementById('miningLog').innerHTML = '<div style="color:var(--dim);text-align:center;padding:20px">No mining log entries yet</div>';
    }
  } catch(e) {
    document.getElementById('statusDot').style.background = 'var(--red)';
    document.getElementById('statusText').textContent = 'Error: ' + e.message;
  }
}

async function refresh() {
  await Promise.all([loadMining(), loadStratum()]);
  document.getElementById('refreshTime').textContent = 'Last updated: ' + new Date().toLocaleString();
}

async function loadStratum() {
  try {
    const r = await fetch('/api/stratum/stats');
    const d = await r.json();

    if (d.stratum_active) {
      document.getElementById('stratumDot').style.background = 'var(--green)';
      document.getElementById('stratumStatus').textContent = 'Online';
      document.getElementById('stratumStatus').style.color = 'var(--green)';
    }

    document.getElementById('sStatus').textContent = d.stratum_active ? 'Online' : 'Offline';
    document.getElementById('sStatus').style.color = d.stratum_active ? 'var(--green)' : 'var(--red)';
    document.getElementById('sPort').textContent = d.port || '—';
    document.getElementById('sConn').textContent = d.connections ?? 0;
    document.getElementById('sWorkers').textContent = d.workers ?? 0;
    document.getElementById('sShares').textContent = d.total_shares ?? 0;
    document.getElementById('sBlocks').textContent = d.blocks_found ?? 0;

    if (d.worker_list && d.worker_list.length > 0) {
      document.getElementById('workerList').innerHTML = '<strong>Workers:</strong> ' +
        d.worker_list.map(w => `${w.name} (${w.shares} shares, ${w.accepted} accepted)`).join(', ');
    } else {
      document.getElementById('workerList').innerHTML = 'No workers connected';
    }
  } catch (e) {
    document.getElementById('stratumDot').style.background = 'var(--red)';
    document.getElementById('stratumStatus').textContent = 'Offline';
    document.getElementById('stratumStatus').style.color = 'var(--red)';
    document.getElementById('sStatus').textContent = 'Offline';
    document.getElementById('sStatus').style.color = 'var(--red)';
  }
}

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
